graphql:
  endpoint.url: https://api.github.com/graphql
  token: ${LANDSCAPE_SCANNING_TOKEN}
  
logging:
  level:
    org.springframework: DEBUG
    
debug: true

landscapeUrl: https://raw.githubusercontent.com/finos/finos-landscape/main/landscape.yml
landscapeLogoPrefix: https://raw.githubusercontent.com/finos/finos-landscape/master/hosted_logos/
  
githubOrgs: finos, finos-labs

reports: readme
 
readme:
  repo: .github
  owner: finos
  base: main
  head: generated-branch

scan:
  output: target/toc-scorecard.csv

# Calendar Configuration
#
# Source: an iCalendar (RFC 5545) feed served over HTTP. Set the full URL
# (including any auth token the feed requires) via the LFX_CALENDAR_ICS_URL env
# var, or override it locally in application-local.yml. If unset, calendar
# functionality is silently disabled.
#   Example: LFX_CALENDAR_ICS_URL=https://lfx-calendar.lfx-calendar.workers.dev/?token=...
#
# Project Mappings: Maps projects from README to their associated calendar events using keyword patterns
# Events are matched if they contain any of the specified keywords/phrases (case-insensitive)
# Assume the name of the project is also a pattern.
# So, if you include the project name in the meeting name (good practice), you won't need to map it here.
calendar:
  ical:
    url: ${LFX_CALENDAR_ICS_URL:}

  projects:
    # Special Interest Groups
    "AI Readiness":
      - AI Governance
      - GenAI
      - LLM
    
    "DevOps Automation":
      - DevOps
      - Dev Ops
      - Architecture as Code
      - Evolution at Scale
      - SDLC
    
    "Open Source Talent Acceleration":
      - Talent
    
    "Open source readiness":
      - OSR
    
    # Incubating Projects
    "Accessibility Theme Builder":
      - A11y
    
    "Common Architecture Language Model":
      - Architecture as Code
    
    "Common Cloud Controls":
      - CCC
      - CFI
    
    "Common Domain Model":
      - CDM
    
    "Compliant Financial Infrastructure":
      - Compliant Financial Infrastructure
      - CFI
    
    "kdb+":
      - KDB
